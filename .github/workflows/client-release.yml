name: Client Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., desktop-v0.1.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build-agent:
    name: Build agent binary (${{ matrix.arch }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - arch: x86_64
            target: x86_64-apple-darwin
          - arch: aarch64
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build agent binary
        run: cargo build --release --target ${{ matrix.target }}

      - uses: actions/upload-artifact@v7
        with:
          name: agent-${{ matrix.arch }}
          path: target/${{ matrix.target }}/release/agent

  build-macos:
    name: Build macOS app (universal)
    runs-on: macos-latest
    needs: build-agent
    steps:
      - uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download agent binaries
        uses: actions/download-artifact@v8
        with:
          path: /tmp/agent-binaries

      - name: Create universal agent binary
        run: |
          mkdir -p client/macos/Runner/Resources
          lipo -create \
            /tmp/agent-binaries/agent-x86_64/agent \
            /tmp/agent-binaries/agent-aarch64/agent \
            -output client/macos/Runner/Resources/agent
          chmod +x client/macos/Runner/Resources/agent
          file client/macos/Runner/Resources/agent

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Run Dart tests (shared package)
        working-directory: packages/agent_code_client
        run: dart pub get && dart test --exclude-tags e2e

      - name: Run Flutter tests
        working-directory: client
        run: flutter test || true

      - name: Analyze
        working-directory: client
        run: flutter analyze --no-fatal-infos || true

      - name: Build macOS app
        working-directory: client
        run: flutter build macos --release

      - name: Create DMG
        run: |
          APP_NAME="agent_code_client_app"
          APP_PATH="client/build/macos/Build/Products/Release/${APP_NAME}.app"
          DMG_NAME="AgentCode-${{ inputs.version }}-macos-universal.dmg"

          if [ ! -d "$APP_PATH" ]; then
            echo "App not found at $APP_PATH"
            echo "Listing build directory:"
            find client/build/macos -name "*.app" -type d 2>/dev/null
            exit 1
          fi

          mkdir -p /tmp/dmg-contents
          cp -R "$APP_PATH" /tmp/dmg-contents/
          ln -s /Applications /tmp/dmg-contents/Applications

          hdiutil create -volname "Agent Code" \
            -srcfolder /tmp/dmg-contents \
            -ov -format UDZO \
            "$DMG_NAME"

          echo "DMG_NAME=$DMG_NAME" >> "$GITHUB_ENV"
          ls -lh "$DMG_NAME"

      - uses: actions/upload-artifact@v7
        with:
          name: client-macos-dmg
          path: ${{ env.DMG_NAME }}

  build-linux:
    name: Build Linux app
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v6

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake git ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build Linux app
        working-directory: client
        run: flutter build linux --release

      - name: Package Linux app
        run: |
          cd client/build/linux/x64/release/bundle
          tar czf "$GITHUB_WORKSPACE/AgentCode-${{ inputs.version }}-linux-x86_64.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: client-linux
          path: AgentCode-${{ inputs.version }}-linux-x86_64.tar.gz

  build-web:
    name: Build web (WASM)
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Get dependencies
        working-directory: client
        run: flutter pub get

      - name: Build web WASM
        working-directory: client
        run: flutter build web --wasm

      - name: Package web build
        run: |
          cd client/build/web
          tar czf "$GITHUB_WORKSPACE/AgentCode-${{ inputs.version }}-web.tar.gz" .

      - uses: actions/upload-artifact@v7
        with:
          name: client-web
          path: AgentCode-${{ inputs.version }}-web.tar.gz

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-macos, build-linux, build-web]
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: /tmp/release

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=""
          for f in /tmp/release/client-*/*; do
            ASSETS="$ASSETS $f"
          done

          gh release create "${{ inputs.version }}" \
            --title "Desktop ${{ inputs.version }}" \
            --notes "$(cat <<'NOTES'
          ## Agent Code Desktop Client

          Cross-platform desktop client for Agent Code.

          ### Downloads
          - **macOS** (universal, x86_64 + aarch64): DMG installer
          - **Linux** (x86_64): tar.gz bundle
          - **Web** (WASM): self-hosted web app

          ### macOS Install
          1. Download the DMG
          2. Open it and drag Agent Code to Applications
          3. Right-click > Open on first launch (unsigned build)

          ### Linux Install
          1. Extract the tar.gz
          2. Run the `agent_code_client_app` binary
          3. Requires GTK3

          ### Web
          1. Extract the tar.gz to a web server
          2. Serve the directory (e.g., `python3 -m http.server`)
          3. Connect to an already-running `agent serve` instance

          ### Requirements
          - macOS 12.0+ (Monterey) or Linux with GTK3
          - The agent binary is bundled in the macOS DMG
          NOTES
          )" \
            --prerelease \
            $ASSETS
