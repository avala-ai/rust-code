name: Release E2E Tests

on:
  push:
    tags: ["v*"]
  pull_request:
    types: [labeled]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  e2e:
    name: E2E Test Suite
    if: >-
      github.event_name != 'pull_request' ||
      github.event.label.name == 'run-e2e'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: sudo apt-get install -y ripgrep jq

      - name: Build release binary
        run: cargo build --release

      - name: Run E2E tests
        run: chmod +x scripts/e2e-tests.sh && scripts/e2e-tests.sh
        env:
          AGENT_BINARY: target/release/agent
          AGENT_CODE_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          AGENT_CODE_API_BASE_URL: https://openrouter.ai/api/v1
          AGENT_CODE_MODEL: openai/gpt-5-nano
