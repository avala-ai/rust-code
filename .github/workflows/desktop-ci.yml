name: Desktop CI

on:
  pull_request:
    paths:
      - 'desktop/**'
      - 'packages/agent_code_client/**'
  push:
    branches: [main]
    paths:
      - 'desktop/**'
      - 'packages/agent_code_client/**'

jobs:
  test:
    name: Dart tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Get dependencies (shared package)
        working-directory: packages/agent_code_client
        run: dart pub get

      - name: Analyze (shared package)
        working-directory: packages/agent_code_client
        run: dart analyze --fatal-infos

      - name: Run tests (shared package)
        working-directory: packages/agent_code_client
        run: dart test

  build-check:
    name: Flutter build check
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Generate macOS runner (if not committed)
        working-directory: desktop
        run: |
          if [ ! -d macos ]; then
            flutter create --platforms=macos --project-name=agent_code_desktop .
          fi

      - name: Get dependencies
        working-directory: desktop
        run: flutter pub get

      - name: Analyze
        working-directory: desktop
        run: flutter analyze --no-fatal-infos || true

      - name: Build macOS (release)
        working-directory: desktop
        run: flutter build macos --release
