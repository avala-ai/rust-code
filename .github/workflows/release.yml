name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux builders are pinned to ubuntu-22.04 (glibc 2.35) so the
          # release binaries don't import weak GLIBC_2.39 symbols
          # (pidfd_spawnp, pidfd_getpid) from newer runners. Those resolve
          # to NULL on systems with older glibc and segfault when tokio
          # spawns a subprocess. See issue #134.
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: agent-linux-x86_64
            archive: tar.gz
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: agent-linux-aarch64
            archive: tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: agent-macos-x86_64
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: agent-macos-aarch64
            archive: tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: agent-windows-x86_64
            archive: zip
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install cross-compiler (aarch64-linux)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"' >> ~/.cargo/config.toml
      - run: cargo build --release --target ${{ matrix.target }}
      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz agent
      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "target/${{ matrix.target }}/release/agent.exe" -DestinationPath "${{ matrix.artifact }}.zip"
      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.${{ matrix.archive }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            agent-linux-x86_64/agent-linux-x86_64.tar.gz
            agent-linux-aarch64/agent-linux-aarch64.tar.gz
            agent-macos-x86_64/agent-macos-x86_64.tar.gz
            agent-macos-aarch64/agent-macos-aarch64.tar.gz
            agent-windows-x86_64/agent-windows-x86_64.zip
          generate_release_notes: true

  publish-crate:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo publish -p agent-code-lib --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - run: sleep 30  # Wait for crates.io to index the lib crate
      - run: cargo publish -p agent-code --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  update-homebrew:
    name: Update Homebrew tap
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      - name: Download release artifacts
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/avala-ai/agent-code/releases/download/v${VERSION}"
          for ARTIFACT in agent-macos-aarch64 agent-macos-x86_64 agent-linux-aarch64 agent-linux-x86_64; do
            curl -fSL -o "${ARTIFACT}.tar.gz" "${BASE}/${ARTIFACT}.tar.gz"
          done
      - name: Compute checksums
        id: sha
        run: |
          echo "macos_arm64=$(sha256sum agent-macos-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "macos_x86_64=$(sha256sum agent-macos-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_arm64=$(sha256sum agent-linux-aarch64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
          echo "linux_x86_64=$(sha256sum agent-linux-x86_64.tar.gz | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"
      - name: Generate formula
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cat > agent-code.rb <<FORMULA
          class AgentCode < Formula
            desc "AI-powered coding agent for the terminal, written in pure Rust"
            homepage "https://github.com/avala-ai/agent-code"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/avala-ai/agent-code/releases/download/v${VERSION}/agent-macos-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_arm64 }}"
              else
                url "https://github.com/avala-ai/agent-code/releases/download/v${VERSION}/agent-macos-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.macos_x86_64 }}"
              end
            end

            on_linux do
              if Hardware::CPU.arm?
                url "https://github.com/avala-ai/agent-code/releases/download/v${VERSION}/agent-linux-aarch64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_arm64 }}"
              else
                url "https://github.com/avala-ai/agent-code/releases/download/v${VERSION}/agent-linux-x86_64.tar.gz"
                sha256 "${{ steps.sha.outputs.linux_x86_64 }}"
              end
            end

            def install
              bin.install "agent"
            end

            test do
              assert_match "agent ${VERSION}", shell_output("#{bin}/agent --version")
            end
          end
          FORMULA
          sed -i 's/^          //' agent-code.rb
      - name: Push to homebrew-tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          CONTENT=$(base64 -w0 agent-code.rb)
          SHA=$(gh api repos/avala-ai/homebrew-tap/contents/Formula/agent-code.rb --jq '.sha')
          gh api -X PUT repos/avala-ai/homebrew-tap/contents/Formula/agent-code.rb \
            -f message="Update agent-code to v${VERSION}" \
            -f content="${CONTENT}" \
            -f sha="${SHA}" \
            -f branch="main"

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Update version from tag
        working-directory: npm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
      - name: Publish
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
